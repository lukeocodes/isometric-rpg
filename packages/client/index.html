<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>16Bit Online</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
      canvas { display: block; width: 100vw !important; height: 100vh !important; image-rendering: pixelated; image-rendering: crisp-edges; touch-action: none; }
      #loading {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #0a0a0a; color: #fff;
        font-family: monospace; font-size: 14px; gap: 12px;
        z-index: 100;
      }
      #loading.hidden { display: none; }
      #loading-bar-wrap {
        width: 200px; height: 8px; background: #222; border: 1px solid #444;
      }
      #loading-bar { height: 100%; background: #5aff5a; width: 0%; transition: width 0.2s; }
    </style>
  </head>
  <body>
    <div id="loading">
      <div>16BIT ONLINE</div>
      <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
      <div id="loading-text">Connecting...</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
